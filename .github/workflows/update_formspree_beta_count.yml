name: Update Formspree Beta Count

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-formspree-count:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          FORMSPREE_API_TOKEN: ${{ secrets.FORMSPREE_API_TOKEN }}
          FORMSPREE_FORM_ID: ${{ secrets.FORMSPREE_FORM_ID }}
        run: |
          if [ -z "$FORMSPREE_API_TOKEN" ] || [ -z "$FORMSPREE_FORM_ID" ]; then
            echo "FORMSPREE_API_TOKEN and FORMSPREE_FORM_ID must be configured in repository secrets."
            exit 1
          fi

      - name: Fetch submission count from Formspree API
        env:
          FORMSPREE_API_TOKEN: ${{ secrets.FORMSPREE_API_TOKEN }}
          FORMSPREE_FORM_ID: ${{ secrets.FORMSPREE_FORM_ID }}
        run: |
          response=$(curl -fsSL \
            -H "Authorization: Bearer $FORMSPREE_API_TOKEN" \
            "https://formspree.io/api/0/forms/$FORMSPREE_FORM_ID/submissions?per_page=1")

          total_submissions=$(echo "$response" | jq -r '.total // (.submissions | length) // 0')

          if ! [[ "$total_submissions" =~ ^[0-9]+$ ]]; then
            echo "Invalid submission count from Formspree API: $total_submissions"
            exit 1
          fi

          updated_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --argjson total "$total_submissions" \
            --arg source "formspree" \
            --arg updated "$updated_at" \
            '{total_submissions: $total, source: $source, last_updated: $updated}' \
            > web/data/beta-count.json

      - name: Commit updated beta count
        run: |
          if git diff --quiet web/data/beta-count.json; then
            echo "No beta count changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/beta-count.json
          git commit -m "chore(web): sync beta count from formspree"
          git push
