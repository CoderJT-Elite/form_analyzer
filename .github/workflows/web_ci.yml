name: Web CI

on:
  pull_request:
    paths:
      - "web/**"
      - "index.html"
      - ".github/workflows/web_ci.yml"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "index.html"
      - ".github/workflows/web_ci.yml"

jobs:
  web-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure no placeholder form IDs
        run: |
          if grep -R "PLACEHOLDER_FORM_ID" web index.html; then
            echo "Placeholder form ID found."
            exit 1
          fi

      - name: Lint HTML
        run: npx --yes htmlhint "web/**/*.html" "index.html"

      - name: Validate beta count payload
        run: |
          jq -e '
            has("total_submissions")
            and (.total_submissions | type == "number")
            and (.total_submissions >= 0)
            and has("source")
            and (.source == "formspree")
            and has("last_updated")
          ' web/data/beta-count.json > /dev/null
