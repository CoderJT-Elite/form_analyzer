name: Flutter CI

on:
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/flutter_ci.yml"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/flutter_ci.yml"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
